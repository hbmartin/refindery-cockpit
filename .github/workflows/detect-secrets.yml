name: Detect Secrets

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-secrets:
    name: detect-secrets
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install detect-secrets
        run: |
          python3 -m venv "$RUNNER_TEMP/detect-secrets-venv"
          "$RUNNER_TEMP/detect-secrets-venv/bin/python" -m pip install --require-hashes --only-binary=:all: -r .github/requirements/detect-secrets.txt
          echo "$RUNNER_TEMP/detect-secrets-venv/bin" >> "$GITHUB_PATH"

      - name: Check committed files for secrets
        run: git ls-files -z | xargs -0 detect-secrets-hook --baseline .secrets.baseline
