name: Setup Playwright
description: Cache and install Playwright browsers with system dependencies

inputs:
  browsers:
    description: Space-separated list of browsers to install
    required: false
    default: 'chromium'

runs:
  using: composite
  steps:
    - name: Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ inputs.browsers }}-${{ hashFiles('**/pnpm-lock.yaml') }}

    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        BROWSERS: ${{ inputs.browsers }}
      run: pnpm exec playwright install $BROWSERS --with-deps

    - name: Install Playwright system deps
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      shell: bash
      env:
        BROWSERS: ${{ inputs.browsers }}
      run: pnpm exec playwright install-deps $BROWSERS
